<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            color:#222;
            padding:40px 20px;
        }

        h1{
            text-align:center;
            font-size:42px;
            margin-bottom:10px;
        }

        body > p:first-of-type{
            text-align:center;
            color:#666;
            margin-bottom:30px;
            font-size:18px;
        }

        hr{
            max-width:900px;
            margin:30px auto;
            border:none;
            height:1px;
            background:#ddd;
        }

        ul{
            max-width:900px;
            margin:0 auto;
            list-style:none;
        }

        li{
            background:#fff;
            margin:15px 0;
            padding:18px 20px;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            transition:.25s;
        }

        li:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(0,0,0,.12);
        }

        a{
            color:#0077cc;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
        }

        a:hover{
            text-decoration:underline;
        }

        p:last-of-type,
        p:nth-last-of-type(2){
            text-align:center;
            margin-top:15px;
        }

        @media (max-width:768px){
            h1{
                font-size:32px;
            }

            a{
                font-size:16px;
            }
        }
    </style>

</head>
<body>

    <h1>Blog</h1>
    <p>Latest posts.</p>

    <hr>

    <ul>
        <li><a href="https://45thbrigade.dpdns.org/russiaattackkiev.html">Russia massive attack Kiev</a></li>
        <li><a href="https://45thbrigade.dpdns.org/baltickievrussia.html">Baltic help Kiev to attack kiev</a></li>
    </ul>

    <hr>

    <p><a href="index.html">← Back to Home</a></p>

</body>
</html>
