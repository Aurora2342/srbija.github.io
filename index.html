<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>shahed maps update Ukraine</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      font-family: Arial, sans-serif;
    }

    .map {
      width: 100%;
      height: 90vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .info {
      padding: 15px;
      text-align: center;
      background: #12121a;
      color: white;
      border-top: 1px solid #222;
    }
  </style>
</head>

<body>

<div class="map">
  <iframe 
    allowfullscreen 
    allow="geolocation"
    src="https://umap.openstreetmap.fr/sr/map/shahed-maps-update-ukraine_1417428">
  </iframe>
</div>

<div class="info">
  Every evening from 21.30 UTC / 22.30 Moscow time, the map will be updated,sometimes there will be updates earlier.
</div>

</body>
</html>
