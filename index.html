<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbia ar maps</title>

<style>
  body {
    margin: 0;
    overflow: hidden; /* 🔒 nema scrolla */
    font-family: Arial, sans-serif;
    background: #0f0f0f;
  }

  /* TOP BAR */
  .topbar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 10;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .topbar span {
    color: #4da3ff;
  }

  /* MAPA FULLSCREEN */
  .map {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* DARK OVERLAY (vizuelni lock efekat) */
  .overlay {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    pointer-events: none;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
  }

</style>
</head>

<body>

<div class="topbar">
  Zaključana mapa: <span>Srbija</span>
</div>

<div class="map">
  <iframe
    src="https://www.google.com/maps/d/u/0/embed?mid=12lpsWraaDL0jSf0_tM0QsnwFBopoDK0&ehbc=2E312F"
    loading="lazy">
  </iframe>
</div>

<div class="overlay"></div>

</body>
</html>
